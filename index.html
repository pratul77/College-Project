<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise 20</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header>
            <h1>WeatherWise 20 - Advanced Weather Forecast</h1>
            <div class="search-bar">
                <input type="text" id="cityInput" placeholder="Enter city...">
                <button onclick="getWeather()">Search</button>
            </div>
        </header>

        <!-- Current Weather Display -->
        <section class="current-weather">
            <h2 id="cityName">City Name</h2>
            <div class="temp">
                <span id="temperature">--°C</span>
                <span id="condition">--</span>
            </div>
            <p id="description">Weather Description</p>
        </section>

        <!-- 20-Day Forecast -->
        <section class="forecast">
            <h2>20-Day Forecast</h2>
            <div id="forecastContainer" class="forecast-container"></div>
        </section>

        <!-- Alerts Section -->
        <section class="alerts">
            <h2>Weather Alerts</h2>
            <div id="alertMessage">No alerts at the moment.</div>
        </section>

        <!-- Interactive Map -->
        <section class="map-section">
            <h2>Weather Map</h2>
            <div id="map" class="map"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
